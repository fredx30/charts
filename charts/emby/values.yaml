# Default values for emby-chart.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

mediaVolume:
  volumeName: "emby-media-volume"
  claimName: "emby-media-claim"
  size: 100Gi
  #storageClass: ""
  #hostPath: "/tmp/emby-media"

configVolume:
  volumeName: "emby-config-volume"
  claimName: "emby-config-claim"
  size: 10Gi
  #storageClass: ""
  #hostPath: "/tmp/emby-config"

hostNetwork: false

deploymentStrategy:
  type: Recreate
  # rollingUpdate is only used when type is RollingUpdate
  # rollingUpdate:
  #   maxSurge: 1
  #   maxUnavailable: 0

dlna:
  enabled: false
  # When true, a dedicated Service is created for DLNA UDP ports.
  # Set separateService: false to add ports to the main service instead.
  separateService: true
  ssdpPort: 1900       # UDP — SSDP/UPnP multicast discovery
  discoveryPort: 7359  # UDP — Emby local network discovery broadcast
  serviceType: LoadBalancer
  loadBalancerIP: ""   # optional fixed IP (e.g. a MetalLB address)

volumeAnnotations: { }
claimAnnotations: { }

image:
  repository: emby/embyserver
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""


podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# Environment variables passed to the emby container.
# The emby/embyserver image runs s6-overlay as root for init, then drops
# privileges to the user/group specified by UID/GID/GIDLIST env vars.
# Example for running emby as host uid:gid 8096:
# env:
#   - name: UID
#     value: "8096"
#   - name: GID
#     value: "8096"
#   - name: GIDLIST
#     value: "8096"
env: []

# Environment variables sourced from ConfigMaps or Secrets.
# envFrom:
#   - secretRef:
#       name: emby-secrets
envFrom: []

service:
  type: ClusterIP
  local:
    portName: http
    port: 8096
  external:
    portName: https
    port: 8920

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: emby
              port:
                name: http
    - host: chart-example.external
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: emby
              port:
                name: https
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 2000m
    memory: 2Gi

livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http


# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}
